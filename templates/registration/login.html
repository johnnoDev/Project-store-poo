{% extends "billing/base.html" %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-header text-center bg-dark text-white">
        <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ form.username.label }}</label>
            <input type="text" name="username" class="form-control" autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ form.password.label }}</label>
            <input type="password" name="password" class="form-control">
          </div>
          {% if form.errors %}
            <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
          {% endif %}
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
          </button>
        </form>
      </div>
      <div class="card-footer text-center">
        <small>¿No tienes cuenta? <a href="{% url 'billing:signup' %}">Regístrate aquí</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
