{% extends "billing/base.html" %}
{% block title %}Eliminar Proveedor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h4>
      </div>
      <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar el proveedor <strong>{{ object.name }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Sí, eliminar</button>
            <a href="{% url 'billing:supplier_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
